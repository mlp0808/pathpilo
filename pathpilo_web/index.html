<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathPilo - Login Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-info {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .user-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e9ecef;
        }

        .user-detail:last-child {
            border-bottom: none;
        }

        .user-detail strong {
            color: #495057;
        }

        .user-detail span {
            color: #6c757d;
        }

        .companies {
            margin-top: 1.5rem;
        }

        .companies h4 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .company-item {
            background: white;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            border: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .company-name {
            font-weight: 600;
            color: #333;
        }

        .company-role {
            background: #667eea;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .logout-btn {
            width: 100%;
            padding: 0.5rem;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .logout-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>PathPilo</h1>
            <p>Login to access your account</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button class="btn" id="loginBtn" onclick="handleLogin()">
                <span id="loginText">Login</span>
            </button>

            <div id="message"></div>
        </div>

        <!-- User Info (shown after login) -->
        <div id="userInfo" class="hidden">
            <div class="user-info">
                <h3>Welcome back!</h3>

                <div id="userDetails">
                    <!-- User details will be populated here -->
                </div>

                <div class="companies">
                    <h4>Your Companies</h4>
                    <div id="companyList">
                        <!-- Companies will be populated here -->
                    </div>
                </div>
            </div>

            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:8000/api';

        // Global state
        let currentToken = null;
        let currentUser = null;

        // DOM elements
        const loginForm = document.getElementById('loginForm');
        const userInfo = document.getElementById('userInfo');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const message = document.getElementById('message');
        const userDetails = document.getElementById('userDetails');
        const companyList = document.getElementById('companyList');

        // Show message to user
        function showMessage(text, type = 'error') {
            message.className = `message ${type}`;
            message.textContent = text;
            message.style.display = 'block';

            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    message.style.display = 'none';
                }, 3000);
            }
        }

        // Hide message
        function hideMessage() {
            message.style.display = 'none';
        }

        // Set loading state
        function setLoading(loading) {
            loginBtn.disabled = loading;
            if (loading) {
                loginText.innerHTML = '<div class="loading"></div>Logging in...';
            } else {
                loginText.textContent = 'Login';
            }
        }

        // Handle login
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Validation
            if (!email || !password) {
                showMessage('Please fill in all fields');
                return;
            }

            setLoading(true);
            hideMessage();

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Login successful
                currentToken = data.token;
                currentUser = data.user;

                showMessage('Login successful!', 'success');

                // Show user info and hide login form
                setTimeout(() => {
                    displayUserInfo();
                    loginForm.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message || 'Login failed. Please try again.');
            } finally {
                setLoading(false);
            }
        }

        // Display user information
        function displayUserInfo() {
            if (!currentUser) return;

            // User details
            userDetails.innerHTML = `
                <div class="user-detail">
                    <strong>Name:</strong>
                    <span>${currentUser.firstName} ${currentUser.lastName}</span>
                </div>
                <div class="user-detail">
                    <strong>Email:</strong>
                    <span>${currentUser.email}</span>
                </div>
                <div class="user-detail">
                    <strong>Role:</strong>
                    <span>${currentUser.company_role || currentUser.role}</span>
                </div>
            `;

            // Fetch and display companies
            fetchCompanies();
        }

        // Fetch user's companies
        async function fetchCompanies() {
            try {
                const response = await fetch(`${API_BASE}/companies`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch companies');
                }

                const data = await response.json();

                if (data.companies && data.companies.length > 0) {
                    displayCompanies(data.companies);
                } else {
                    companyList.innerHTML = '<p style="color: #6c757d; text-align: center; padding: 1rem;">No companies found</p>';
                }

            } catch (error) {
                console.error('Error fetching companies:', error);
                companyList.innerHTML = '<p style="color: #dc3545; text-align: center; padding: 1rem;">Failed to load companies</p>';
            }
        }

        // Display companies
        function displayCompanies(companies) {
            companyList.innerHTML = '';

            companies.forEach(company => {
                const companyElement = document.createElement('div');
                companyElement.className = 'company-item';
                companyElement.innerHTML = `
                    <div class="company-name">${company.name}</div>
                    <div class="company-role">${company.role || 'Member'}</div>
                `;
                companyList.appendChild(companyElement);
            });
        }

        // Handle logout
        function handleLogout() {
            currentToken = null;
            currentUser = null;

            // Hide user info and show login form
            userInfo.classList.add('hidden');
            loginForm.classList.remove('hidden');

            // Clear form
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';

            hideMessage();
        }

        // Allow Enter key to submit login
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !loginForm.classList.contains('hidden')) {
                handleLogin();
            }
        });

        // Check if user is already logged in (on page load)
        window.addEventListener('load', function() {
            // You could implement token persistence here
            console.log('PathPilo Web App loaded - API Base:', API_BASE);
        });
    </script>
</body>
</html>
