name: Deploy PathPilo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: Production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api-server/package-lock.json
            marketing/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Install Marketing Dependencies
        run: cd marketing && npm ci

      - name: Write .env for Build
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_MAPBOX_TOKEN=${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}" \
            "NEXT_PUBLIC_HOTJAR_ID=${{ vars.NEXT_PUBLIC_HOTJAR_ID }}" \
            "NEXT_PUBLIC_HOTJAR_SV=${{ vars.NEXT_PUBLIC_HOTJAR_SV }}" \
            "NEXT_PUBLIC_CRISP_WEBSITE_ID=${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}" \
            "NEXT_PUBLIC_API_URL=" > .env
          # Marketing is a separate Next.js app — it only reads env from marketing/
          printf '%s\n' \
            "NEXT_PUBLIC_HOTJAR_ID=${{ vars.NEXT_PUBLIC_HOTJAR_ID }}" \
            "NEXT_PUBLIC_HOTJAR_SV=${{ vars.NEXT_PUBLIC_HOTJAR_SV }}" \
            "NEXT_PUBLIC_CRISP_WEBSITE_ID=${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}" > marketing/.env
          if [ -z "${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}" ]; then
            echo "::warning::NEXT_PUBLIC_CRISP_WEBSITE_ID is empty in GitHub Actions Variables — Crisp will NOT be in the production build. Add it under Settings → Secrets and variables → Actions → Variables (Production environment)."
          fi

      - name: Build Frontend
        run: npm run build

      - name: Build Marketing
        run: cd marketing && npm run build

      - name: Create Deployment Archive
        shell: bash
        run: |
          set +e
          tar -czf deployment.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=logs \
            --exclude=PathPiloMobile \
            --exclude=pathpilo_web_OLD_DO_NOT_USE \
            --exclude='marketing/node_modules' \
            --exclude='api-server/node_modules' \
            --exclude='api-server/.env' \
            .
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 1 ]; then
            echo "Archive created successfully"
            exit 0
          else
            echo "Archive creation failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful'"

      - name: Upload Archive to Server
        run: |
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key deployment.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/

      - name: Deploy on Server
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
          set -e
          APP="/home/pathpilo/htdocs/pathpilo.com"
          TEMP_DEPLOY="/tmp/pathpilo_deploy_$$"

          mkdir -p $TEMP_DEPLOY

          echo "==> Extracting deployment..."
          tar -xzf /tmp/deployment.tar.gz -C $TEMP_DEPLOY

          echo "==> Syncing files..."
          rsync -a --delete \
            --exclude='.env' \
            --exclude='api-server/.env' \
            --exclude='node_modules' \
            --exclude='api-server/node_modules' \
            --exclude='marketing/node_modules' \
            --exclude='logs' \
            $TEMP_DEPLOY/ $APP/

          rm -rf $TEMP_DEPLOY
          rm -f /tmp/deployment.tar.gz

          cd $APP

          echo "==> Writing .env..."
          # Every deploy REPLACES .env from GitHub — FTP edits are overwritten.
          # Configure repo/environment secrets & variables in GitHub (see .env.example).
          # When a GitHub value is missing, we keep the previous server value if present.

          read_env_key() {
            local file="$1" key="$2"
            [ -f "$file" ] || return 0
            grep -E "^${key}=" "$file" 2>/dev/null | tail -1 | cut -d= -f2- || true
          }

          use_deploy_or_preserved() {
            local deploy_val="$1" preserved_val="$2" label="$3"
            if [ -n "$deploy_val" ]; then
              printf '%s' "$deploy_val"
            elif [ -n "$preserved_val" ]; then
              echo "==> ${label}: kept existing server value (GitHub not set)" >&2
              printf '%s' "$preserved_val"
            fi
          }

          PRESERVED_SECURE_NOTES_KEY=""
          PRESERVED_CRISP=""
          PRESERVED_STRIPE_SECRET=""
          PRESERVED_STRIPE_WEBHOOK=""
          PRESERVED_STRIPE_MONTHLY=""
          PRESERVED_STRIPE_ANNUAL=""
          if [ -f api-server/.env ]; then
            PRESERVED_SECURE_NOTES_KEY="$(read_env_key api-server/.env SECURE_NOTES_MASTER_KEY)"
            PRESERVED_STRIPE_SECRET="$(read_env_key api-server/.env STRIPE_SECRET_KEY)"
            PRESERVED_STRIPE_WEBHOOK="$(read_env_key api-server/.env STRIPE_WEBHOOK_SECRET)"
            PRESERVED_STRIPE_MONTHLY="$(read_env_key api-server/.env STRIPE_PRICE_MONTHLY)"
            PRESERVED_STRIPE_ANNUAL="$(read_env_key api-server/.env STRIPE_PRICE_ANNUAL)"
          fi
          if [ -f .env ]; then
            [ -z "$PRESERVED_SECURE_NOTES_KEY" ] && PRESERVED_SECURE_NOTES_KEY="$(read_env_key .env SECURE_NOTES_MASTER_KEY)"
            PRESERVED_CRISP="$(read_env_key .env NEXT_PUBLIC_CRISP_WEBSITE_ID)"
          fi

          DEPLOY_SECURE_NOTES_KEY="$(use_deploy_or_preserved '${{ secrets.SECURE_NOTES_MASTER_KEY }}' "$PRESERVED_SECURE_NOTES_KEY" 'SECURE_NOTES_MASTER_KEY')"
          if [ -z "$DEPLOY_SECURE_NOTES_KEY" ]; then
            echo "==> WARNING: SECURE_NOTES_MASTER_KEY is empty — add GitHub secret SECURE_NOTES_MASTER_KEY"
          fi

          DEPLOY_CRISP="$(use_deploy_or_preserved '${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}' "$PRESERVED_CRISP" 'NEXT_PUBLIC_CRISP_WEBSITE_ID')"
          if [ -z '${{ vars.NEXT_PUBLIC_CRISP_WEBSITE_ID }}' ] && [ -z "$DEPLOY_CRISP" ]; then
            echo "==> WARNING: NEXT_PUBLIC_CRISP_WEBSITE_ID is empty — Crisp disabled (set GitHub Variable + redeploy)"
          fi

          DEPLOY_STRIPE_SECRET="$(use_deploy_or_preserved '${{ secrets.STRIPE_SECRET_KEY }}' "$PRESERVED_STRIPE_SECRET" 'STRIPE_SECRET_KEY')"
          DEPLOY_STRIPE_WEBHOOK="$(use_deploy_or_preserved '${{ secrets.STRIPE_WEBHOOK_SECRET }}' "$PRESERVED_STRIPE_WEBHOOK" 'STRIPE_WEBHOOK_SECRET')"
          DEPLOY_STRIPE_MONTHLY="$(use_deploy_or_preserved '${{ vars.STRIPE_PRICE_MONTHLY }}' "$PRESERVED_STRIPE_MONTHLY" 'STRIPE_PRICE_MONTHLY')"
          DEPLOY_STRIPE_ANNUAL="$(use_deploy_or_preserved '${{ vars.STRIPE_PRICE_ANNUAL }}' "$PRESERVED_STRIPE_ANNUAL" 'STRIPE_PRICE_ANNUAL')"
          if [ -z "$DEPLOY_STRIPE_SECRET" ]; then
            echo "==> WARNING: STRIPE_SECRET_KEY is empty — billing will fail (add GitHub secret STRIPE_SECRET_KEY)"
          fi

          printf '%s\n' \
            "DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ vars.DB_HOST }}:${{ vars.DB_PORT }}/${{ vars.DB_NAME }}" \
            "DB_HOST=${{ vars.DB_HOST }}" \
            "DB_PORT=${{ vars.DB_PORT }}" \
            "DB_NAME=${{ vars.DB_NAME }}" \
            "DB_USER=${{ vars.DB_USER }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "ADMIN_EMAIL=${{ vars.ADMIN_EMAIL }}" \
            "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "NEXT_PUBLIC_MAPBOX_TOKEN=${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}" \
            "NEXT_PUBLIC_HOTJAR_ID=${{ vars.NEXT_PUBLIC_HOTJAR_ID }}" \
            "NEXT_PUBLIC_HOTJAR_SV=${{ vars.NEXT_PUBLIC_HOTJAR_SV }}" \
            "NEXT_PUBLIC_CRISP_WEBSITE_ID=$DEPLOY_CRISP" \
            "FROM_EMAIL=${{ vars.FROM_EMAIL }}" \
            "FROM_NAME=${{ vars.FROM_NAME }}" \
            "FRONTEND_URL=${{ vars.FRONTEND_URL }}" \
            "API_PORT=${{ vars.API_PORT }}" \
            "PORT=${{ vars.PORT }}" \
            "NODE_ENV=production" \
            "ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            "SECURE_NOTES_MASTER_KEY=$DEPLOY_SECURE_NOTES_KEY" \
            "STRIPE_SECRET_KEY=$DEPLOY_STRIPE_SECRET" \
            "STRIPE_WEBHOOK_SECRET=$DEPLOY_STRIPE_WEBHOOK" \
            "STRIPE_PRICE_MONTHLY=$DEPLOY_STRIPE_MONTHLY" \
            "STRIPE_PRICE_ANNUAL=$DEPLOY_STRIPE_ANNUAL" \
            "APP_URL=${{ vars.APP_URL }}" \
            "NEXT_PUBLIC_API_URL=" > .env

          printf '%s\n' \
            "DB_HOST=${{ vars.DB_HOST }}" \
            "DB_PORT=${{ vars.DB_PORT }}" \
            "DB_NAME=${{ vars.DB_NAME }}" \
            "DB_USER=${{ vars.DB_USER }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            "FROM_EMAIL=${{ vars.FROM_EMAIL }}" \
            "FRONTEND_URL=${{ vars.APP_URL }}" \
            "API_PORT=${{ vars.API_PORT }}" \
            "NODE_ENV=production" \
            "ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            "SECURE_NOTES_MASTER_KEY=$DEPLOY_SECURE_NOTES_KEY" \
            "STRIPE_SECRET_KEY=$DEPLOY_STRIPE_SECRET" \
            "STRIPE_WEBHOOK_SECRET=$DEPLOY_STRIPE_WEBHOOK" \
            "STRIPE_PRICE_MONTHLY=$DEPLOY_STRIPE_MONTHLY" \
            "STRIPE_PRICE_ANNUAL=$DEPLOY_STRIPE_ANNUAL" \
            "APP_URL=${{ vars.APP_URL }}" > api-server/.env

          echo "==> Installing production dependencies..."
          npm ci --omit=dev
          cd api-server && npm ci --omit=dev && cd ..
          cd marketing && npm ci --omit=dev && cd ..

          mkdir -p logs

          echo "==> Restarting services..."
          pm2 restart pathpilo-frontend --update-env
          pm2 restart pathpilo-api --update-env
          pm2 restart pathpilo-marketing --update-env
          pm2 save

          echo "==> Deploy complete!"
          DEPLOY_SCRIPT

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f deployment.tar.gz
